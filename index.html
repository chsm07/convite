<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Site Misterioso</title>
    <style>
        :root {
            --cor-fundo: #fdf2f8; 
            --cor-primaria: #8e44ad; 
            --cor-azul: #a2d2ff; 
            --cor-verde: #86efac; 
            --cor-erro: #ff7675;
        }

        body {
            height: 100vh; margin: 0; display: flex; align-items: center; justify-content: center;
            background-color: var(--cor-fundo); font-family: 'Segoe UI', sans-serif; overflow: hidden;
        }

        .container {
            text-align: center; padding: 35px; background: white; border-radius: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08); max-width: 380px; width: 90%; position: relative;
        }

        h1 { font-size: 1.5rem; color: var(--cor-primaria); margin-bottom: 25px; }

        .btn-base {
            padding: 12px 20px; font-size: 1rem; font-weight: bold; border: none;
            border-radius: 15px; cursor: pointer; margin: 10px; display: inline-block;
        }

        .btn-acao { background-color: var(--cor-azul); color: white; }
        .btn-sim { background-color: var(--cor-verde); color: #1e3799; }
        .btn-fuga { background-color: var(--cor-erro); color: white; position: fixed; z-index: 10; }
        .btn-desaparece { background-color: var(--cor-erro); color: white; }

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <!-- TELA 1 -->
    <div id="tela1" class="container">
        <h1>oi ou nada vê?</h1>
        <button class="btn-base btn-acao" onclick="irPara(2)">oi kkkkk</button>
        <button class="btn-base" onclick="alert('opção errada')">nada vê</button>
    </div>

    <!-- TELA 2 -->
    <div id="tela2" class="container hidden">
        <h1>Você é pernambucana ou cariok?</h1>
        <button class="btn-base btn-sim" onclick="irPara(3)">cariok</button>
        <button id="btn-fujao" class="btn-base btn-fuga" onmouseover="fuga()">pernambucana</button>
    </div>

    <!-- TELA 3 -->
    <div id="tela3" class="container hidden">
        <h1 id="texto3">Infelizmente, vamos ter que sair para que eu pague a aposta ☹️☹️</h1>
        <button class="btn-base btn-sim" onclick="finalizar()">claro!</button>
        <button id="btn-sumir" class="btn-base btn-desaparece" onmouseover="sumir()" ontouchstart="sumir()">melhor não</button>
    </div>

    <script>
        const FORMSPREE_ID = "mkoyqrja";

        function irPara(n) {
            document.querySelectorAll('.container').forEach(t => t.classList.add('hidden'));
            document.getElementById('tela' + n).classList.remove('hidden');
            if(n === 2) document.getElementById("btn-fujao").style.display = "inline-block";
            if(n === 3) alert("foi como imaginei");
        }

        function fuga() {
            const b = document.getElementById("btn-fujao");
            b.style.left = Math.random() * (window.innerWidth - 100) + "px";
            b.style.top = Math.random() * (window.innerHeight - 100) + "px";
        }

        function sumir() {
            document.getElementById("btn-sumir").style.display = "none";
        }

        async function finalizar() {
            let email = prompt("Digite seu e-mail para receber as informações do date:");
            if (email) {
                let fd = new FormData();
                fd.append('email', email);
                fd.append('mensagem', 'Ela aceitou o convite!');
                
                fetch(`https://formspree.io/f/${FORMSPREE_ID}`, { method: "POST", body: fd, headers: {'Accept': 'application/json'} });
                alert("Perfeito! Já recebi aqui 😉");
            }
        }
    </script>
</body>
</html>
